name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Frontend source (Go handlers, templates, static assets)
      - 'src/frontend/**'
      # Proto definitions (may affect frontend RPC layer)
      - 'protos/**'
      # Build files
      - 'go.mod'
      - 'go.sum'
      # Docker / deployment
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.yaml'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'skyramp-testbot[bot]' }}

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      # Generate a GitHub App installation token to retrigger CI workflows on push
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: skyramp/testbot@b63d089325c7fb1088443853273ff688f209615c # v0.6.14
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ steps.app-token.outputs.token }}
          skyrampMcpVersion: next
          skyrampExecutorVersion: v1.3.14

          # --- SUT (System Under Test) Configuration ---
          targetSetupCommand: './deployment-testbot/boutique/setup.sh'
          targetReadyCheckCommand: 'curl -f -H "Cookie: shop_session-id=x-readycheck" http://localhost:8080/_healthz'
          targetReadyCheckTimeout: 180

          testDirectory: 'tests'
          autoCommit: true
          postPrComment: true
          enableDebug: true
